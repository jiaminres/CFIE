<svg width="1800" height="1040" viewBox="0 0 1800 1040" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3.5-122B 训练基座架构</title>
  <desc id="desc">GPU、CPU 内存与 NVMe 三层容量体系下的 Qwen3.5-122B 训练基座。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      .title { font: 700 38px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 28px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .lane-note { font: 400 15px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .card-title { font: 700 19px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .card-body { font: 400 15px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 13px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .badge { font: 700 14px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .flow { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .flow-blue { stroke: #2563eb; marker-end: url(#arrow-blue); }
      .flow-green { stroke: #059669; marker-end: url(#arrow-green); }
      .flow-orange { stroke: #d97706; marker-end: url(#arrow-orange); }
      .flow-dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1800" height="1040" fill="url(#bg)"/>
  <text x="70" y="62" class="title">Qwen3.5-122B 训练基座：分层容量与热参数轮转</text>
  <text x="70" y="94" class="subtitle">目标：全量 FP32 主参数落盘，CPU 承载当前训练热参数与优化器，GPU 只保留前向影子、GPTQ 冷专家缓存和梯度桶。</text>

  <!-- Lanes -->
  <rect x="50" y="120" width="1700" height="270" rx="28" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <rect x="50" y="420" width="1700" height="300" rx="28" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <rect x="50" y="750" width="1700" height="220" rx="28" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>

  <rect x="80" y="150" width="90" height="210" rx="18" fill="#2563eb"/>
  <text x="125" y="240" text-anchor="middle" class="badge">GPU</text>
  <text x="125" y="265" text-anchor="middle" class="badge">显存</text>

  <rect x="80" y="450" width="90" height="240" rx="18" fill="#059669"/>
  <text x="125" y="555" text-anchor="middle" class="badge">CPU</text>
  <text x="125" y="580" text-anchor="middle" class="badge">内存</text>

  <rect x="80" y="780" width="90" height="160" rx="18" fill="#d97706"/>
  <text x="125" y="850" text-anchor="middle" class="badge">NVMe</text>
  <text x="125" y="875" text-anchor="middle" class="badge">磁盘</text>

  <!-- GPU cards -->
  <g filter="url(#shadow)">
    <rect x="220" y="155" width="250" height="102" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="245" y="190" class="card-title">Dense 前向参数</text>
    <text x="245" y="218" class="card-body">FP16 / BF16 常驻</text>
    <text x="245" y="240" class="tiny">TP/PP 后本 rank shard</text>

    <rect x="520" y="155" width="270" height="102" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="545" y="190" class="card-title">当前训练 MoE 影子</text>
    <text x="545" y="218" class="card-body">CPU FP32 master cast</text>
    <text x="545" y="240" class="tiny">只保留本轮 hot experts</text>

    <rect x="840" y="155" width="290" height="102" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="865" y="190" class="card-title">GPTQ Int4 专家缓存</text>
    <text x="865" y="218" class="card-body">冷专家前向 resident cache</text>
    <text x="865" y="240" class="tiny">按 router / predictor 异步预取</text>

    <rect x="1180" y="155" width="265" height="102" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="1205" y="190" class="card-title">梯度 bucket 环</text>
    <text x="1205" y="218" class="card-body">bucket0 / bucket1 / ...</text>
    <text x="1205" y="240" class="tiny">满桶立即 D2H，不缓存全梯度</text>

    <rect x="1490" y="155" width="220" height="102" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="1515" y="190" class="card-title">峰值监控</text>
    <text x="1515" y="218" class="card-body">显存 / bucket / miss</text>
    <text x="1515" y="240" class="tiny">触发自动降级</text>

    <rect x="520" y="295" width="270" height="66" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="545" y="323" class="card-title">Activation checkpoint</text>
    <text x="545" y="347" class="tiny">按 bucket 与峰值选择重算粒度</text>

    <rect x="840" y="295" width="290" height="66" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="865" y="323" class="card-title">H2D prefetch stream</text>
    <text x="865" y="347" class="tiny">CPU→GPU 专家上传与计算重叠</text>

    <rect x="1180" y="295" width="265" height="66" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="1205" y="323" class="card-title">D2H offload stream</text>
    <text x="1205" y="347" class="tiny">梯度桶异步卸载到 pinned memory</text>
  </g>

  <!-- CPU cards -->
  <g filter="url(#shadow)">
    <rect x="220" y="465" width="250" height="108" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="245" y="500" class="card-title">训练 scheduler</text>
    <text x="245" y="528" class="card-body">选择当前轮 hot set</text>
    <text x="245" y="550" class="tiny">高频优先 + 覆盖率约束</text>

    <rect x="520" y="465" width="270" height="108" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="545" y="500" class="card-title">当前训练 FP32 热参数</text>
    <text x="545" y="528" class="card-body">唯一权威 master</text>
    <text x="545" y="550" class="tiny">更新后刷新 GPU shadow</text>

    <rect x="840" y="465" width="290" height="108" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="865" y="500" class="card-title">全量 MoE GPTQ Int4</text>
    <text x="865" y="528" class="card-body">CPU / mmap 前向缓存</text>
    <text x="865" y="550" class="tiny">冷专家按需上传</text>

    <rect x="1180" y="465" width="265" height="108" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="1205" y="500" class="card-title">CPU 梯度镜像</text>
    <text x="1205" y="528" class="card-body">pinned bucket mirror</text>
    <text x="1205" y="550" class="tiny">供 CPU optimizer 消费</text>

    <rect x="1490" y="465" width="220" height="108" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="1515" y="500" class="card-title">Adam 状态</text>
    <text x="1515" y="528" class="card-body">FP8 m / v + scale</text>
    <text x="1515" y="550" class="tiny">当前训练参数状态</text>

    <rect x="520" y="615" width="270" height="66" rx="16" fill="#d1fae5" stroke="#86efac"/>
    <text x="545" y="643" class="card-title">训练窗口状态</text>
    <text x="545" y="667" class="tiny">记录 step / epoch / 数据游标</text>

    <rect x="840" y="615" width="290" height="66" rx="16" fill="#d1fae5" stroke="#86efac"/>
    <text x="865" y="643" class="card-title">Pinned staging</text>
    <text x="865" y="667" class="tiny">H2D / D2H DMA 缓冲池</text>

    <rect x="1180" y="615" width="265" height="66" rx="16" fill="#d1fae5" stroke="#86efac"/>
    <text x="1205" y="643" class="card-title">刷盘队列</text>
    <text x="1205" y="667" class="tiny">窗口结束写回权威存储</text>
  </g>

  <!-- Disk cards -->
  <g filter="url(#shadow)">
    <rect x="270" y="815" width="330" height="100" rx="18" fill="#ffffff" stroke="#fde68a"/>
    <text x="300" y="850" class="card-title">全量 FP32 主参数 shard</text>
    <text x="300" y="878" class="card-body">约 488GB 原始体积</text>
    <text x="300" y="900" class="tiny">训练窗口结束写回 hot 参数</text>

    <rect x="730" y="815" width="330" height="100" rx="18" fill="#ffffff" stroke="#fde68a"/>
    <text x="760" y="850" class="card-title">GPTQ Int4 缓存文件</text>
    <text x="760" y="878" class="card-body">按 quant layout hash 复用</text>
    <text x="760" y="900" class="tiny">支持 mmap，降低 CPU 常驻压力</text>

    <rect x="1190" y="815" width="330" height="100" rx="18" fill="#ffffff" stroke="#fde68a"/>
    <text x="1220" y="850" class="card-title">训练进度文件</text>
    <text x="1220" y="878" class="card-body">step / epoch / 数据游标</text>
    <text x="1220" y="900" class="tiny">参数已刷盘后再原子更新</text>
  </g>

  <!-- Flows -->
  <path class="flow flow-orange" d="M 435 815 C 435 750, 585 745, 655 681"/>
  <text x="455" y="752" class="tiny">加载当前 hot FP32</text>

  <path class="flow flow-blue" d="M 590 465 C 555 385, 455 320, 345 257"/>
  <text x="385" y="395" class="tiny">FP32 hot → Dense shadow</text>

  <path class="flow flow-blue" d="M 655 465 C 655 380, 655 330, 655 257"/>
  <text x="675" y="395" class="tiny">FP32 hot → MoE 训练 shadow</text>

  <path class="flow flow-blue" d="M 985 465 C 985 395, 985 340, 985 257"/>
  <text x="1005" y="395" class="tiny">冷专家异步预取</text>

  <path class="flow flow-green" d="M 1312 257 C 1312 330, 1312 395, 1312 465"/>
  <text x="1332" y="395" class="tiny">梯度 bucket D2H</text>

  <path class="flow flow-green" d="M 1445 519 C 1462 519, 1474 519, 1490 519"/>
  <text x="1370" y="452" class="tiny">CPU optimizer 消费</text>

  <path class="flow flow-green" d="M 1490 560 C 1380 710, 755 725, 655 573"/>
  <rect x="1160" y="704" width="184" height="28" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <text x="1174" y="723" class="tiny">Adam 更新 FP32 master</text>

  <path class="flow flow-green" d="M 790 492 C 810 438, 820 438, 840 492"/>
  <rect x="690" y="430" width="204" height="28" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <text x="704" y="449" class="tiny">训练后重新量化 GPTQ MoE</text>

  <path class="flow flow-orange flow-dash" d="M 1030 573 C 1110 655, 1080 745, 1015 815"/>
  <rect x="1060" y="642" width="190" height="28" rx="14" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="1074" y="661" class="tiny">写回更新后的 GPTQ cache</text>

  <path class="flow flow-orange" d="M 655 681 C 600 745, 520 765, 435 815"/>
  <text x="530" y="795" class="tiny">窗口结束刷盘</text>

  <path class="flow flow-orange" d="M 1312 681 C 1312 730, 1338 780, 1355 815"/>
  <text x="1368" y="755" class="tiny">写训练进度</text>

  <path class="flow flow-dash flow-green" d="M 470 519 C 490 500, 500 495, 520 500"/>
  <text x="335" y="610" class="tiny">选择本轮训练参数</text>

  <path class="flow flow-dash flow-green" d="M 1490 210 C 1410 390, 590 415, 345 465"/>
  <text x="1430" y="300" class="tiny">峰值反馈：缩 bucket / hot set / activation segment</text>

  <path class="flow flow-orange" d="M 860 815 C 800 735, 805 640, 865 573"/>
  <rect x="705" y="704" width="162" height="28" rx="14" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="719" y="723" class="tiny">mmap / 后台量化缓存</text>

  <!-- Footer notes -->
  <rect x="220" y="985" width="1290" height="34" rx="17" fill="#e2e8f0"/>
  <text x="250" y="1008" class="tiny">默认策略：4 个 GPU 梯度 bucket 环；非当前训练 experts 走 GPTQ Int4 前向；训练窗口结束先刷 FP32 / Adam / GPTQ，再原子记录 step、epoch 与数据游标。</text>
</svg>
